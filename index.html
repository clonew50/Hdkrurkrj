        * {

            padding: 0;
            box-sizing: border-box;

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .calculator-wrapper {
            position: relative;
            z-index: 10;
        }

        .calculator {
            width: 380px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s ease;
        }

        .calculator.shake {
            animation: screenShake 0.6s ease-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-10px, -8px) rotate(-2deg); }
            20% { transform: translate(10px, 8px) rotate(2deg); }
            30% { transform: translate(-8px, 5px) rotate(-1deg); }
            40% { transform: translate(8px, -5px) rotate(1deg); }
            50% { transform: translate(-6px, 7px) rotate(-1deg); }
            60% { transform: translate(6px, -4px) rotate(1deg); }
            70% { transform: translate(-4px, 5px) rotate(-0.5deg); }
            80% { transform: translate(4px, -2px) rotate(0.5deg); }
            90% { transform: translate(-2px, 2px) rotate(0); }
        }

        .display {
            background: linear-gradient(135deg, #0f0f1a, #1a0a2e);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            border: 1px solid rgba(138, 43, 226, 0.2);
            overflow: hidden;
            position: relative;
        }

        .display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(138, 43, 226, 0.5), transparent);
        }

        .expression {
            color: rgba(255, 255, 255, 0.4);
            font-size: 15px;
            min-height: 24px;
            word-break: break-all;
            text-align: right;
            width: 100%;
            direction: ltr;
            font-family: 'Courier New', monospace;
        }

        .result {
            color: #fff;
            font-size: 36px;
            font-weight: 400;
            text-align: right;
            width: 100%;
            direction: ltr;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            line-height: 1.2;
            word-break: break-word;
        }

        .result.insult {
            animation: glitchText 0.15s infinite;
            text-shadow: 0 0 15px rgba(255, 0, 64, 0.4);
        }

        .result.insult .insult-text {
            display: inline-block;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ff0040, #ff6b00, #ffed00, #00ff88, #00b4ff, #8b5cf6, #ff0040);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowShift 2s linear infinite;
        }

        .result.sixtyseven {
            animation: sixtySevenBounce 0.5s ease-in-out infinite alternate;
        }

        .result.sixtyseven .sixtyseven-text {
            display: inline-block;
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899, #8b5cf6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        .result.sixtyseven .sixtyseven-emoji {
            display: inline-block;
            font-size: 40px;
            -webkit-text-fill-color: initial;
            background: none;
            margin-right: 10px;
            animation: emojiShrug 1s ease-in-out infinite alternate;
        }

        @keyframes sixtySevenBounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes emojiShrug {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-8px) rotate(10deg); }
        }

        .result.insult .insult-emoji {
            display: inline-block;
            font-size: 28px;
            margin-right: 6px;
            -webkit-text-fill-color: initial;
            background: none;
            animation: emojiBounce 0.5s ease-in-out infinite alternate;
        }

        @keyframes emojiBounce {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.2) translateY(-3px); }
        }

        .result.success {
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        @keyframes glitchText {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 1px); }
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .buttons {

            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {

            border: none;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            user-select: none;
        }

        .btn::after {
            content: '';

            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn:active::after {

            height: 200px;

            top: 0;
            left: 0;
            width: 100%;

            z-index: 100;

            margin-top: 12px;
            min-height: 16px;
            transition: all 0.3s ease;

    </style>
</head>

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        let particles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 6 + 2;
                this.speedX = (Math.random() - 0.5) * 16;
                this.speedY = (Math.random() - 0.5) * 16;
                this.gravity = 0.15;
                this.life = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.3;
                this.shape = Math.random() > 0.5 ? 'circle' : 'square';
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                this.speedX *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                }

                ctx.restore();
            }
        }

        function spawnParticles(x, y, count = 100, colors = ['#8b5cf6', '#c026cf', '#ff0040', '#ff6b00', '#00ff88', '#00b4ff', '#ffed00']) {
            for (let i = 0; i < count; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-rain';
                    emoji.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
                    emoji.style.left = Math.random() * 100 + 'vw';
                    emoji.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    emoji.style.animationDelay = (Math.random() * 0.5) + 's';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 5000);
                }, i * 80);
            }
        }

        function appendNum(num) {
            if (shouldReset) {
                expression = '';
                displayExpression = '';
                currentNumber = '';
                shouldReset = false;
                const resultEl = document.getElementById('result');
                resultEl.classList.remove('insult', 'success', 'sixtyseven');
            }
            if (currentNumber === '0' && num !== '.') {
                currentNumber = num;
            } else {
                currentNumber += num;
            }
            updateDisplay();
        }

        function appendOp(op) {
            if (shouldReset) {
                shouldReset = false;
            }
            expression += currentNumber + ' ' + op + ' ';
            displayExpression += currentNumber + ' ' + op + ' ';
            currentNumber = '0';
            updateDisplay();
        }

        function appendDot() {
            if (shouldReset) {
                expression = '';
                displayExpression = '';
                currentNumber = '0';
                shouldReset = false;
                const resultEl = document.getElementById('result');
                resultEl.classList.remove('insult', 'success', 'sixtyseven');
            }
            if (!currentNumber.includes('.')) {
                currentNumber += '.';
            }
            updateDisplay();
        }

        function appendFunc(func) {
            if (shouldReset) {
                expression = '';
                displayExpression = '';
                currentNumber = '0';
                shouldReset = false;
                const resultEl = document.getElementById('result');
                resultEl.classList.remove('insult', 'success', 'sixtyseven');
            }
            expression += func + '(';
            displayExpression += func + '(';
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            displayExpression = '';
            currentNumber = '0';
            shouldReset = false;
            const resultEl = document.getElementById('result');
            resultEl.classList.remove('insult', 'success', 'sixtyseven');
            resultEl.textContent = '0';
            document.getElementById('expression').textContent = '';
            document.getElementById('statusBar').textContent = '';
        }

        function updateDisplay() {
            document.getElementById('expression').textContent = displayExpression;
            document.getElementById('result').textContent = currentNumber || '0';
        }

        function evaluateExpression(expr) {
            let parsed = expr;
            parsed = parsed.replace(/÷/g, '/');
            parsed = parsed.replace(/×/g, '*');
            parsed = parsed.replace(/−/g, '-');

            parsed = parsed.replace(/sin\(/g, 'Math.sin(');
            parsed = parsed.replace(/cos\(/g, 'Math.cos(');

            const openCount = (parsed.match(/\(/g) || []).length;
            const closeCount = (parsed.match(/\)/g) || []).length;
            for (let i = 0; i < openCount - closeCount; i++) {
                parsed += ')';
            }

            if (/\/\s*0(?![\d.])/.test(parsed)) {
                throw new Error('DIV_BY_ZERO');
            }

            try {
                const result = Function('"use strict"; return (' + parsed + ')')();
                
                if (typeof result === 'number') {
                    if (isNaN(result)) throw new Error('NAN');
                    if (!isFinite(result)) throw new Error('INFINITE');
                    return parseFloat(result.toFixed(10));
                }
                throw new Error('INVALID');
            } catch (e) {
                if (e.message === 'DIV_BY_ZERO') throw e;
                throw new Error('INVALID');
            }
        }

        function checkComplexity(evalStr) {
            const length = evalStr.length;
            const hasTrig = /sin|cos/.test(evalStr);
            const nestedParen = (evalStr.match(/\(/g) || []).length >= 2;
            const multipleOps = (evalStr.match(/[+\-×÷]/g) || []).length >= 3;
            
            return hasTrig || nestedParen || multipleOps || length > 20;
        }

        function checkEasy(evalStr) {
            const easyPatterns = [
                /^1\s*[\+\-]\s*1$/,
                /^2\s*[\+\-]\s*2$/,
                /^1\s*[\+×]\s*0$/,
                /^0\s*[\+−]\s*0$/,
                /^1\s*×\s*1$/,
                /^0\s*×\s*\d+$/,
                /^\d+\s*−\s*\d+$/
            ];
            
            const hasSingleOp = (evalStr.match(/[+−×÷]/g) || []).length === 1;
            const isSimple = /\d+\s*[+−×÷]\s*\d+/.test(evalStr) && hasSingleOp && !/[sinco()]/.test(evalStr);
            
            return easyPatterns.some(p => p.test(evalStr)) || (isSimple && evalStr.length < 8);
        }

        function checkDumb(evalStr) {
            return /÷\s*0\b/.test(evalStr) || /\b0\s*÷\s*0\b/.test(evalStr);
        }

        function calculate() {
            interactionCount++;
            
            const fullExpression = displayExpression + currentNumber;
            const evalExpression = expression + currentNumber;
            const cleanEval = evalExpression.trim();

            // Check if empty
            if (!cleanEval || cleanEval === '0') {
                showInsult(emptyInsults, emptyEmojis, 'empty');
                return;
            }

            // Check for 67 Easter egg
            if (cleanEval === '67') {
                showSixtySeven();
                return;
            }

            // Check for dumb/invalid math
            if (checkDumb(evalExpression) || /\b0\s*÷\s*0\b/.test(fullExpression)) {
                showInsult(dumbInsults, dumbEmojis, 'error');
                return;
            }

            // Check for easy math
            if (checkEasy(evalExpression)) {
                showInsult(easyInsults, easyEmojis, 'error');
                return;
            }

            // Check for hard/complex math
            if (checkComplexity(evalExpression)) {
                showInsult(hardInsults, hardEmojis, 'error');
                return;
            }

            // Try normal calculation
            document.getElementById('expression').textContent = fullExpression + ' =';

            try {
                const result = evaluateExpression(evalExpression);
                const resultEl = document.getElementById('result');
                resultEl.classList.remove('insult', 'sixtyseven');
                resultEl.classList.add('success');
                resultEl.textContent = formatNumber(result);

                document.getElementById('statusBar').textContent = 
                    normalStatuses[Math.floor(Math.random() * normalStatuses.length)];

                const flash = document.getElementById('flashOverlay');
                flash.className = 'flash-overlay normal active';

                const calc = document.getElementById('calculator');
                const rect = calc.getBoundingClientRect();
                spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, 50, 
                    ['#4ade80', '#22c55e', '#86efac', '#ffffff']);

            } catch (e) {
                showInsult(dumbInsults, dumbEmojis, 'error');
            }

            expression = '';
            displayExpression = '';
            currentNumber = '';
            shouldReset = true;
        }

        function showSixtySeven() {
            const calc = document.getElementById('calculator');
            const rect = calc.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            // Shake calculator
            calc.classList.remove('shake');
            void calc.offsetWidth;
            calc.classList.add('shake');

            // Flash
            const flash = document.getElementById('flashOverlay');
            flash.className = 'flash-overlay sixtyseven active';

            // Gold particles
            spawnParticles(cx, cy, 100, ['#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#ffffff']);
            setTimeout(() => spawnParticles(cx - 100, cy, 40, ['#f59e0b', '#ef4444']), 100);
            setTimeout(() => spawnParticles(cx + 100, cy, 40, ['#f59e0b', '#ec4899']), 200);

            // Emoji rain
            spawnEmojiRain(15, sixtySevenEmojis);

            // Update expression display
            document.getElementById('expression').textContent = '67 =';

            // Update result with 67 meme
            const resultEl = document.getElementById('result');
            resultEl.classList.remove('success', 'insult');
            resultEl.classList.add('sixtyseven');
            
            const randomMsg = sixtySevenMessages[Math.floor(Math.random() * sixtySevenMessages.length)];
            const parts = randomMsg.split(' ');
            const emojiPart = parts.pop();
            const textPart = parts.join(' ');
            
            resultEl.innerHTML = `<span class="sixtyseven-emoji">${emojiPart}</span><span class="sixtyseven-text">${textPart}</span>`;

            document.getElementById('statusBar').textContent = "🤷‍♂️ You know... 🤷‍♂️";

            expression = '';
            displayExpression = '';
            currentNumber = '';
            shouldReset = true;
        }

        function showInsult(insultList, emojiList, flashType) {
            interactionCount++;
            const calc = document.getElementById('calculator');
            const rect = calc.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            // Shake calculator
            calc.classList.remove('shake');
            void calc.offsetWidth;
            calc.classList.add('shake');

            // Flash
            const flash = document.getElementById('flashOverlay');
            flash.className = 'flash-overlay ' + flashType + ' active';

            // Particles
            if (flashType === 'error') {
                spawnParticles(cx, cy, 120, ['#ff0040', '#ff6b00', '#ff0000', '#ff3333']);
                setTimeout(() => spawnParticles(cx - 100, cy, 40, ['#ff0040', '#ff6b00']), 100);
                setTimeout(() => spawnParticles(cx + 100, cy, 40, ['#ff0040', '#ff6b00']), 200);
            } else if (flashType === 'empty') {
                spawnParticles(cx, cy, 40, ['#ffffff', '#cccccc', '#888888']);
            }

            // Emoji rain
            spawnEmojiRain(18, emojiList);

            // Update expression display
            const fullExpression = displayExpression + currentNumber;
            document.getElementById('expression').textContent = fullExpression ? fullExpression + ' =' : '(empty) =';

            // Update result with separated emoji and text
            const resultEl = document.getElementById('result');
            resultEl.classList.remove('success', 'sixtyseven');
            resultEl.classList.add('insult');
            
            const randomInsult = insultList[Math.floor(Math.random() * insultList.length)];
            const randomEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            resultEl.innerHTML = `<span class="insult-emoji">${randomEmoji}</span><span class="insult-text">${randomInsult}</span>`;

            document.getElementById('statusBar').textContent = 
                insultStatuses[Math.min(Math.floor(interactionCount / 2), insultStatuses.length - 1)];

            expression = '';
            displayExpression = '';
            currentNumber = '';
            shouldReset = true;
        }

        function formatNumber(num) {
            if (Number.isInteger(num) && Math.abs(num) < 1e15) {
                return num.toString();
            }
            if (Math.abs(num) < 0.0001 || Math.abs(num) >= 1e10) {
                return num.toExponential(6);
            }
            return parseFloat(num.toFixed(8)).toString();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNum(e.key);
            else if (e.key === '.') appendDot();
            else if (e.key === '+') appendOp('+');
            else if (e.key === '-') appendOp('−');
            else if (e.key === '*') appendOp('×');
            else if (e.key === '/') { e.preventDefault(); appendOp('÷'); }
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') clearAll();
            else if (e.key === 'Backspace') {
                if (currentNumber.length > 0) {
                    currentNumber = currentNumber.slice(0, -1);
                    if (currentNumber === '') currentNumber = '0';
                    updateDisplay();
                } else if (displayExpression.length > 0) {
                    const parts = displayExpression.trim().split(' ');
                    if (parts.length >= 2) {
                        parts.splice(-2);
                        displayExpression = parts.join(' ') + ' ';
                        expression = displayExpression;
                        currentNumber = parts.length > 0 ? parts[parts.length - 1] : '0';
                        if (isNaN(parseFloat(currentNumber))) {
                            currentNumber = '0';
                        }
                        updateDisplay();
                    }
                }
            }
        });
    </script>
